name: Update YouTube News

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # This lets you run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to save your JSON file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run fetch script
        run: python fetch_yt-news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add videos.json
          # Only commit if there are actually changes to the file
          git commit -m "Automated update: $(date)" || exit 0
          git push
